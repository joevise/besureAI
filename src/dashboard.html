<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貔貅记忆 Besure AI</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232733;--border:#2e3340;--text:#e4e6eb;--text2:#9ca3af;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* === Login === */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;text-align:center}
.login-box .dragon{font-size:48px;margin-bottom:8px}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:4px}
.login-box .sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.login-box input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px}
.login-box input:focus{border-color:var(--accent)}
.login-box .err{color:var(--red);font-size:12px;margin-bottom:8px;min-height:16px}
.login-box button{width:100%;padding:12px;background:var(--accent);border:none;border-radius:10px;color:white;font-size:15px;font-weight:600;cursor:pointer}
.login-box button:hover{background:var(--accent2)}
.login-box button:disabled{opacity:0.5}

/* === Sidebar === */
.sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-header .dragon{font-size:20px}
.sidebar-header .ver{font-size:11px;color:var(--text2);font-weight:400}
.sidebar-stats{padding:8px 16px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);display:flex;gap:12px}
.search-box{padding:12px 16px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.ctx-list{flex:1;overflow-y:auto;padding:8px}
.ctx-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:4px;transition:background .15s;display:flex;flex-direction:column;gap:2px}
.ctx-item:hover{background:var(--surface2)}
.ctx-item.active{background:var(--surface2);border-left:3px solid var(--accent);padding-left:9px}
.ctx-item .title{font-size:14px;font-weight:500}
.ctx-item .meta{font-size:11px;color:var(--text2);display:flex;gap:8px;align-items:center}
.ctx-item .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface2);color:var(--text2)}
.status-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.status-badge.active{background:rgba(16,185,129,.15);color:var(--green)}
.status-badge.paused{background:rgba(245,158,11,.15);color:var(--amber)}
.status-badge.completed{background:rgba(99,102,241,.15);color:var(--accent2)}
.status-badge.archived{background:rgba(156,163,175,.15);color:var(--text2)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:white}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:4px 10px;font-size:12px}

/* === Main === */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.main-header h2{font-size:20px;font-weight:700}
.main-header .subtitle{font-size:13px;color:var(--text2);margin-top:4px}
.main-actions{display:flex;gap:8px}
.timeline{flex:1;overflow-y:auto;padding:20px 24px}
.entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start}
.entry-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.entry-icon.milestone{background:rgba(16,185,129,.15)}.entry-icon.decision{background:rgba(99,102,241,.15)}.entry-icon.progress{background:rgba(56,189,248,.15)}.entry-icon.blocker{background:rgba(239,68,68,.15)}.entry-icon.note{background:rgba(245,158,11,.15)}.entry-icon.init{background:rgba(156,163,175,.15)}
.entry-body{flex:1}
.entry-type{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.entry-type.milestone{color:var(--green)}.entry-type.decision{color:var(--accent2)}.entry-type.progress{color:#38bdf8}.entry-type.blocker{color:var(--red)}.entry-type.note{color:var(--amber)}.entry-type.init{color:var(--text2)}
.entry-date{font-size:11px;color:var(--text2)}
.entry-content{font-size:14px;line-height:1.6;margin-top:6px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:12px}
.empty .dragon{font-size:48px}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:440px;max-width:90vw}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-field{margin-bottom:14px}
.modal-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:vertical}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

.topbar{padding:8px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2)}
.topbar .lock-info{display:flex;gap:8px;align-items:center}
.logout-btn{color:var(--text2);cursor:pointer;font-size:12px;text-decoration:underline}
.logout-btn:hover{color:var(--red)}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="dragon">🐉</div>
    <h2>貔貅记忆 Besure AI</h2>
    <div class="sub" data-zh="请输入主密码以Unlock Dashboard" data-en="Enter your master password to unlock">Enter your master password to unlock</div>
    <input type="password" id="loginPassword" data-zh-ph="主密码" data-en-ph="Master password" placeholder="Master password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="loginErr"></div>
    <button id="loginBtn" onclick="doLogin()">Unlock</button>
  </div>
</div>

<!-- Main App (hidden until authed) -->
<div style="display:none;width:100%;height:100%;flex:1" id="mainApp">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span class="dragon">🐉</span> 貔貅记忆 <span class="ver">v0.2.0</span></h1>
    </div>
    <div class="sidebar-stats" id="stats">
      <span>📋 <span id="ctxCount">0</span> <span data-zh="上下文" data-en="contexts">contexts</span></span>
      <span>📝 <span id="entryCount">0</span> <span data-zh="记录" data-en="entries">entries</span></span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" data-zh-ph="🔍 搜索..." data-en-ph="🔍 Search..." placeholder="🔍 Search..." oninput="handleSearch()">
    </div>
    <div class="ctx-list" id="ctxList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-primary" onclick="showCreateModal()">+ New</button>
      <button class="btn" onclick="refresh()">↻ Refresh</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span>🔒 Encrypted</span>
      <span class="logout-btn" onclick="doLogout()">Logout</span>
    </div>
    <div id="mainContent">
      <div class="empty"><div class="dragon">🐉</div><p>Select a context or create a new one</p></div>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>Create New Context</h3>
    <div class="modal-field"><label>Title *</label><input type="text" id="createTitle" placeholder="Project name"></div>
    <div class="modal-field"><label>Tags (comma separated)</label><input type="text" id="createTags" placeholder="rust, mcp, saas"></div>
    <div class="modal-field"><label>Summary</label><textarea id="createSummary" rows="2" placeholder="One-line description"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="hideModal('createModal')">Cancel</button><button class="btn btn-primary" onclick="doCreate()">Create</button></div>
  </div>
</div>

<div class="modal-overlay" id="entryModal">
  <div class="modal">
    <h3>Add Entry</h3>
    <div class="modal-field"><label>Type</label><select id="entryType"><option value="progress">Progress</option><option value="milestone">Milestone</option><option value="decision">Decision</option><option value="blocker">Blocker</option><option value="note">Note</option></select></div>
    <div class="modal-field"><label>Content</label><textarea id="entryContent" rows="3" placeholder="What you did / decided / found"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="hideModal('entryModal')">Cancel</button><button class="btn btn-primary" onclick="doAddEntry()">Add</button></div>
  </div>
</div>

<script>
let SESSION_TOKEN = sessionStorage.getItem('besure_session') || null;
let currentCtx = null, contexts = [];
const TYPE_ICONS = {milestone:'🎯',decision:'⚡',progress:'✅',blocker:'🚫',note:'📌',init:'🚀'};

async function api(path, opts = {}) {
  const headers = opts.headers || {};
  if (SESSION_TOKEN) headers['Authorization'] = 'Bearer ' + SESSION_TOKEN;
  if (opts.body) headers['Content-Type'] = 'application/json';
  const res = await fetch(path, {...opts, headers});
  if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  if (!res.ok) { const e = await res.json().catch(() => ({error: res.statusText})); throw new Error(e.error || 'Request failed'); }
  return res.json();
}

// === Auth ===
async function doLogin() {
  const pw = document.getElementById('loginPassword').value;
  if (!pw) return;
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginErr').textContent = '';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    const data = await res.json();
    if (data.ok && data.data?.token) {
      SESSION_TOKEN = data.data.token;
      sessionStorage.setItem('besure_session', SESSION_TOKEN);
      hideLogin();
      refresh();
    } else {
      document.getElementById('loginErr').textContent = data.error || 'Wrong password';
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Connection failed: ' + e.message;
  }
  document.getElementById('loginBtn').disabled = false;
}

async function doLogout() {
  try { await api('/api/auth/logout', {method: 'POST'}); } catch(e) {}
  SESSION_TOKEN = null;
  sessionStorage.removeItem('besure_session');
  showLogin();
}

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginPassword').focus();
}

function hideLogin() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
}

// === Init ===
async function init() {
  if (SESSION_TOKEN) {
    try {
      const res = await api('/api/auth/check');
      if (res.ok) { hideLogin(); refresh(); return; }
    } catch(e) {}
  }
  showLogin();
}

async function refresh() {
  try {
    const [ctxRes, statusRes] = await Promise.all([api('/api/contexts'), api('/api/status')]);
    contexts = ctxRes.data || [];
    document.getElementById('ctxCount').textContent = statusRes.data?.contexts ?? 0;
    document.getElementById('entryCount').textContent = statusRes.data?.entries ?? 0;
    renderSidebar();
  } catch(e) { console.error(e); }
}

function renderSidebar() {
  const list = document.getElementById('ctxList');
  if (!contexts.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">No contexts yet<br>点击「新建」Create</div>'; return; }
  list.innerHTML = contexts.map(ctx => `<div class="ctx-item ${currentCtx?.id===ctx.id?'active':''}" onclick="selectCtx('${ctx.id}')"><div class="title">${esc(ctx.title)}</div><div class="meta"><span class="status-badge ${ctx.status}">${ctx.status}</span>${(ctx.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`).join('');
}

async function selectCtx(id) {
  try {
    const res = await api(`/api/contexts/${id}/log`);
    const entries = res.data || [];
    const ctx = contexts.find(c => c.id === id);
    currentCtx = ctx;
    renderSidebar();
    renderDetail(ctx, entries);
  } catch(e) { console.error(e); }
}

function renderDetail(ctx, entries) {
  const main = document.getElementById('mainContent');
  if (!ctx) { main.innerHTML = '<div class="empty"><div class="dragon">🐉</div><p>选择左侧上下文</p></div>'; return; }
  let entriesHtml = entries.length ? entries.map(e => `<div class="entry"><div class="entry-icon ${e.entry_type}">${TYPE_ICONS[e.entry_type]||'📝'}</div><div class="entry-body"><div style="display:flex;justify-content:space-between;align-items:center;"><span class="entry-type ${e.entry_type}">${e.entry_type}</span><span class="entry-date">${esc(e.date)}</span></div><div class="entry-content">${esc(e.content)}</div></div></div>`).join('') : '<div style="padding:20px;color:var(--text2);">No entries yet</div>';
  main.innerHTML = `<div class="main-header"><div><h2>${esc(ctx.title)}</h2><div class="subtitle">${ctx.id} · <span class="status-badge ${ctx.status}">${ctx.status}</span> ${ctx.tags?.length?' · '+ctx.tags.map(t=>'#'+esc(t)).join(' '):''} ${ctx.summary?' · '+esc(ctx.summary):''}</div></div><div class="main-actions"><button class="btn btn-primary btn-sm" onclick="showEntryModal()">+ Add Entry</button><button class="btn btn-sm" onclick="exportCtx('${ctx.id}')">导出</button></div></div><div class="timeline">${entriesHtml}</div>`;
}

let searchTimer = null;
function handleSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { renderSidebar(); if (currentCtx) selectCtx(currentCtx.id); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
}

async function doSearch(q) {
  try {
    const res = await api(`/api/search?q=${encodeURIComponent(q)}`);
    const results = res.data || [];
    const list = document.getElementById('ctxList');
    if (!results.length) { list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">没有"${esc(q)}"的结果</div>`; return; }
    list.innerHTML = results.map(r => `<div class="ctx-item" onclick="selectCtx('${r.context.id}')"><div class="title">${esc(r.context.title)}</div><div class="meta"><span class="status-badge ${r.context.status}">${r.context.status}</span><span style="color:var(--text2);font-size:11px;">${esc(r.entry.entry_type)} · ${esc(r.entry.content.slice(0,40))}...</span></div></div>`).join('');
  } catch(e) { console.error(e); }
}

function showCreateModal() { showModal('createModal'); }
function showEntryModal() { if (!currentCtx) { alert('Please select a context first'); return; } showModal('entryModal'); }
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

async function doCreate() {
  const title = document.getElementById('createTitle').value.trim();
  if (!title) { alert('Please enter a title'); return; }
  const tags = document.getElementById('createTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const summary = document.getElementById('createSummary').value.trim();
  try {
    await api('/api/contexts', {method:'POST',body:JSON.stringify({title,tags,summary})});
    hideModal('createModal');
    document.getElementById('createTitle').value=''; document.getElementById('createTags').value=''; document.getElementById('createSummary').value='';
    await refresh();
  } catch(e) { alert('Create失败: '+e.message); }
}

async function doAddEntry() {
  const content = document.getElementById('entryContent').value.trim();
  if (!content) { alert('请输入Content'); return; }
  const entry_type = document.getElementById('entryType').value;
  try {
    await api(`/api/contexts/${currentCtx.id}/entries`, {method:'POST',body:JSON.stringify({content,entry_type})});
    hideModal('entryModal');
    document.getElementById('entryContent').value='';
    await selectCtx(currentCtx.id);
    refresh();
  } catch(e) { alert('Add失败: '+e.message); }
}

function exportCtx(id) { window.open(`/api/contexts/${id}/export`, '_blank'); }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

init();
setInterval(() => { if (SESSION_TOKEN) refresh(); }, 30000);
</script>
</body>
</html>
