<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> Besure AI Context</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface2:#1c1c1c;
  --surface3:#262626;
  --border:#2e2e2e;
  --border2:#3a3a3a;
  --text:#f0f0f0;
  --text2:#8a8a8a;
  --text3:#5a5a5a;
  --accent:#ff7a1a;
  --accent-dim:rgba(255,122,26,0.12);
  --accent-glow:rgba(255,122,26,0.4);
  --green:#34d399;
  --red:#f87171;
  --grey:#6b7280;
  --radius:14px;
  --font:'Space Grotesk',-apple-system,'PingFang SC','Noto Sans SC',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* === Login === */
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-overlay::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,26,0.06) 0%,transparent 70%);animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.login-box{position:relative;z-index:1;text-align:center;width:340px;padding:40px}
.login-box .logo{font-size:56px;margin-bottom:12px;animation:fadeUp .6s ease}
.login-box h2{font-size:22px;font-weight:700;letter-spacing:-0.02em;animation:fadeUp .6s ease .1s both}
.login-box .sub{font-size:13px;color:var(--text2);margin-bottom:28px;animation:fadeUp .6s ease .2s both}
.login-box input{
  width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:15px;outline:none;margin-bottom:10px;
  font-family:var(--font);animation:fadeUp .6s ease .3s both;
  transition:border-color .2s;
}
.login-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.login-box .err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:6px}
.login-box button{
  width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);
  animation:fadeUp .6s ease .4s both;transition:transform .15s,box-shadow .2s;
}
.login-box button:hover{box-shadow:0 8px 24px var(--accent-glow)}
.login-box button:active{transform:scale(0.98)}
.login-box button:disabled{opacity:0.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === Detail Tabs === */
.detail-tabs{
  display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;
}
.detail-tab{
  padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;
}
.detail-tab:hover{color:var(--text)}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* === Entry Status Badge (entry-level) === */
.entry-status-badge{
  font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.04em;margin-left:6px;
}
.entry-status-badge.active{background:rgba(52,211,153,0.12);color:var(--green)}
.entry-status-badge.superseded{background:rgba(107,114,128,0.15);color:var(--grey)}
.entry-status-badge.expired{background:rgba(248,113,113,0.12);color:var(--red)}
.entry-status-badge.archived{background:rgba(107,114,128,0.15);color:var(--grey)}

/* === Entry Links === */
.entry-links{
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:6px;
}
.entry-link{
  font-size:11px;font-family:var(--mono);
  background:var(--surface3);padding:3px 8px;border-radius:6px;
  color:var(--accent);cursor:pointer;text-decoration:none;
  transition:background .15s;
}
.entry-link:hover{background:var(--accent-dim)}
.entry-expiry{
  margin-top:4px;font-size:11px;color:var(--text3);font-family:var(--mono);
}

/* === Config Card === */
.config-section{
  padding:20px 24px;
}
.config-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:10px;
}
.config-key{
  font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;
}
.config-value{font-size:14px;color:var(--text);margin-top:4px}

/* === App Layout === */
#mainApp{display:none;width:100%;height:100%}
#mainApp.show{display:flex}

/* Desktop: sidebar + main side by side */
@media(min-width:769px){
  #mainApp{flex-direction:row}
  .sidebar{width:300px;min-width:300px;max-width:300px;display:flex !important}
  .mobile-tabbar{display:none}
  .main-area{flex:1;display:flex !important}
  .mobile-back{display:none}
  .search-view{display:none}
}

/* Mobile: full-screen views with slide transitions */
@media(max-width:768px){
  #mainApp{flex-direction:column;position:relative;overflow:hidden}
  .sidebar{
    width:100%;max-width:100%;flex:1;
    position:absolute;inset:0;top:0;bottom:56px;
    transform:translateX(0);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    z-index:2;
  }
  .sidebar.slide-out{transform:translateX(-100%)}
  
  .main-area{
    width:100%;max-width:100%;flex:1;
    position:absolute;inset:0;top:0;bottom:56px;
    transform:translateX(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    z-index:1;
    display:flex !important;
  }
  .main-area.slide-in{transform:translateX(0);z-index:2}
  
  .mobile-tabbar{display:flex}
  .mobile-back{display:none}
  .main-area.slide-in .mobile-back{display:flex}
}

/* === Sidebar === */
.sidebar{
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-header{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
}
.sidebar-header h1{
  font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;
}
.sidebar-header .ver{
  font-size:10px;color:var(--accent);font-weight:600;
  background:var(--accent-dim);padding:2px 8px;border-radius:6px;
}
.sidebar-stats{
  padding:10px 18px;font-size:12px;color:var(--text2);
  border-bottom:1px solid var(--border);display:flex;gap:16px;
}
.sidebar-stats b{color:var(--accent);font-weight:600}
.search-box{padding:12px 14px;border-bottom:1px solid var(--border)}
.search-box input{
  width:100%;padding:9px 12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-size:13px;outline:none;font-family:var(--font);
  transition:border-color .2s;
}
.search-box input:focus{border-color:var(--accent)}
.ctx-list{flex:1;overflow-y:auto;padding:8px}
.ctx-item{
  padding:12px 14px;border-radius:12px;cursor:pointer;
  margin-bottom:4px;transition:background .15s,border-color .15s;
  border:1px solid transparent;
}
.ctx-item:hover{background:var(--surface2)}
.ctx-item.active{
  background:var(--surface2);border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent-dim);
}
.ctx-item .title{font-size:14px;font-weight:500;margin-bottom:4px}
.ctx-item .meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{
  font-size:10px;padding:2px 8px;border-radius:6px;
  background:var(--surface3);color:var(--text2);
}
.status-badge{
  font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.04em;
}
.status-badge.active{background:rgba(52,211,153,0.12);color:var(--green)}
.status-badge.paused{background:rgba(255,122,26,0.12);color:var(--accent)}
.status-badge.completed{background:rgba(138,138,138,0.15);color:var(--text2)}
.sidebar-footer{
  padding:12px 14px;border-top:1px solid var(--border);
  display:flex;gap:8px;
}

/* === Mobile Back Button === */
.mobile-back{
  display:none;align-items:center;gap:6px;
  padding:8px 14px;cursor:pointer;color:var(--accent);
  font-size:14px;font-weight:500;
}
.mobile-back:active{opacity:0.6}

/* === Buttons === */
.btn{
  padding:9px 16px;border:1px solid var(--border2);border-radius:10px;
  background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;
  font-family:var(--font);transition:all .15s;white-space:nowrap;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#ff8a3a;color:#fff;box-shadow:0 4px 16px var(--accent-glow)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{color:var(--accent)}

/* === Main Area === */
.main-area{display:flex;flex-direction:column;overflow:hidden}
.topbar{
  padding:10px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--text2);flex-shrink:0;
}
.topbar .lock{display:flex;gap:6px;align-items:center}

/* === Detail === */
.detail-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
}
.detail-header h2{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.detail-header .subtitle{font-size:12px;color:var(--text2);margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.detail-header .id-badge{
  font-family:var(--mono);font-size:11px;
  background:var(--surface2);padding:2px 8px;border-radius:6px;color:var(--text3);
}

/* === Timeline === */
.timeline{flex:1;overflow-y:auto;padding:20px 24px 80px}
.entry{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:0;margin-bottom:10px;
  display:flex;transition:border-color .15s;
}
.entry:hover{border-color:var(--border2)}
.entry.inactive{opacity:0.4}
.entry-bar{width:3px;flex-shrink:0;border-radius:var(--radius) 0 0 var(--radius)}
.entry-bar.milestone{background:var(--green)}
.entry-bar.decision{background:var(--accent)}
.entry-bar.progress{background:#60a5fa}
.entry-bar.blocker{background:var(--red)}
.entry-bar.note{background:var(--text3)}
.entry-bar.init{background:var(--text3)}
.entry-bar.config{background:#a78bfa}
.entry-body{padding:14px 16px;flex:1}
.entry-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.entry-type{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
}
.entry-type.milestone{color:var(--green)}
.entry-type.decision{color:var(--accent)}
.entry-type.progress{color:#60a5fa}
.entry-type.blocker{color:var(--red)}
.entry-type.note{color:var(--text2)}
.entry-type.init{color:var(--text2)}
.entry-type.config{color:#a78bfa}
.entry-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
.entry-content{font-size:14px;line-height:1.65;color:var(--text)}

/* === Empty === */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.empty .logo{font-size:56px;opacity:0.3}

/* === Modal === */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:28px;width:460px;max-width:92vw;
}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
.modal-field{margin-bottom:16px}
.modal-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.modal-field input,.modal-field textarea,.modal-field select{
  width:100%;padding:11px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-size:14px;outline:none;font-family:var(--font);resize:vertical;
  transition:border-color .2s;
}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

/* === Mobile Tabbar === */
.mobile-tabbar{
  display:none;
  background:var(--surface);border-top:1px solid var(--border);
  padding:8px 0 env(safe-area-inset-bottom,8px);
  justify-content:space-around;flex-shrink:0;
}
.mobile-tabbar .tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;color:var(--text3);cursor:pointer;padding:6px 16px;
  transition:color .15s;
}
.mobile-tabbar .tab.active{color:var(--accent)}
.mobile-tabbar .tab svg{width:22px;height:22px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Animations */
.stagger{animation:fadeUp .4s ease both}
.stagger:nth-child(1){animation-delay:.0s}
.stagger:nth-child(2){animation-delay:.05s}
.stagger:nth-child(3){animation-delay:.1s}
.stagger:nth-child(4){animation-delay:.15s}
.stagger:nth-child(5){animation-delay:.2s}
.stagger:nth-child(6){animation-delay:.25s}

/* Responsive detail header */
@media(max-width:768px){
  .detail-header{padding:16px 16px 12px;flex-direction:column}
  .timeline{padding:16px 16px 80px}
  .topbar{padding:8px 16px}
  .config-section{padding:16px}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="logo">🐉</div>
    <h2> Besure AI Context</h2>
    <div class="sub">Enter your master password to unlock</div>
    <input type="password" id="loginPassword" placeholder="Master password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="loginErr"></div>
    <button id="loginBtn" onclick="doLogin()">Unlock</button>
  </div>
</div>

<!-- App -->
<div id="mainApp">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>🐉 Besure AI Context <span class="ver">v0.56.0</span></h1>
    </div>
    <div class="sidebar-stats">
      <span>📋 <b id="ctxCount">0</b> contexts</span>
      <span>📝 <b id="entryCount">0</b> entries</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search..." oninput="handleSearch()">
    </div>
    <div class="ctx-list" id="ctxList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-primary" onclick="showCreateModal()" style="flex:1">+ New Context</button>
      <button class="btn" onclick="refresh()">↻</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-area" id="mainArea">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="mobile-back" onclick="mobileBack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </div>
        <span class="lock-info">🔒 Encrypted · Local-first</span>
      </div>
      <span class="logout" style="cursor:pointer;color:var(--text2)" onclick="doLogout()">Logout</span>
    </div>
    <div id="mainContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="empty"><div class="logo">🐉</div><p>Select a context or create a new one</p></div>
    </div>
  </div>

  <!-- Mobile Tabbar -->
  <div class="mobile-tabbar" id="mobileTabbar">
    <div class="tab active" onclick="mobileView('list')" id="tabList">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      <span>Contexts</span>
    </div>
    <div class="tab" onclick="mobileView('detail')" id="tabDetail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Timeline</span>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>Create New Context</h3>
    <div class="modal-field"><label>Title *</label><input type="text" id="createTitle" placeholder="Project name"></div>
    <div class="modal-field"><label>Tags (comma separated)</label><input type="text" id="createTags" placeholder="rust, mcp, saas"></div>
    <div class="modal-field"><label>Summary</label><textarea id="createSummary" rows="2" placeholder="One-line description"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="hideModal('createModal')">Cancel</button><button class="btn btn-primary" onclick="doCreate()">Create</button></div>
  </div>
</div>

<div class="modal-overlay" id="entryModal">
  <div class="modal">
    <h3>Add Entry</h3>
    <div class="modal-field">
      <label>Type</label>
      <select id="entryType">
        <option value="progress">Progress</option>
        <option value="milestone">Milestone</option>
        <option value="decision">Decision</option>
        <option value="blocker">Blocker</option>
        <option value="note">Note</option>
      </select>
    </div>
    <div class="modal-field"><label>Content</label><textarea id="entryContent" rows="3" placeholder="What you did / decided / found"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="hideModal('entryModal')">Cancel</button><button class="btn btn-primary" onclick="doAddEntry()">Add</button></div>
  </div>
</div>

<script>
let SESSION_TOKEN=sessionStorage.getItem('besure_session')||null;
let currentCtx=null,contexts=[];
let currentEntries=[];
let activeTab='timeline';
let allVaults=[];
let currentVault=null;
const TYPE_ICONS={milestone:'🎯',decision:'⚡',progress:'✅',blocker:'🚫',note:'📌',init:'🚀',config:'⚙️',lesson:'📖',question:'❓'};
const AGENT_ICONS={openclaw:'🟢',cursor:'🔵',codex:'🟣',vscode:'🟡',custom:'⚪',unknown:'⚪'};

async function api(path,opts={}){
  const headers=opts.headers||{};
  if(SESSION_TOKEN)headers['Authorization']='Bearer '+SESSION_TOKEN;
  if(opts.body)headers['Content-Type']='application/json';
  const res=await fetch(path,{...opts,headers});
  if(res.status===401){showLogin();throw new Error('Unauthorized')}
  if(!res.ok){const e=await res.json().catch(()=>({error:res.statusText}));throw new Error(e.error||'Failed')}
  return res.json();
}

// === Auth ===
async function doLogin(){
  const pw=document.getElementById('loginPassword').value;
  if(!pw)return;
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginErr').textContent='Logging in...';
  try{
    const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    document.getElementById('loginErr').textContent='Response: '+res.status;
    const data=await res.json();
    if(data.ok&&data.data?.token){
      SESSION_TOKEN=data.data.token;
      sessionStorage.setItem('besure_session',SESSION_TOKEN);
      hideLogin();refresh();
    }else{
      document.getElementById('loginErr').textContent=data.error||'Wrong password';
    }
  }catch(e){document.getElementById('loginErr').textContent='Connection failed: '+e.message}
  document.getElementById('loginBtn').disabled=false;
}

async function doLogout(){
  try{await api('/api/auth/logout',{method:'POST'})}catch(e){}
  SESSION_TOKEN=null;sessionStorage.removeItem('besure_session');
  showLogin();
}

function showLogin(){
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('mainApp').classList.remove('show');
  document.getElementById('loginPassword').value='';
  setTimeout(()=>document.getElementById('loginPassword').focus(),100);
}
function hideLogin(){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('mainApp').classList.add('show');
}

// === Mobile Navigation ===
function mobileView(view){
  if(window.innerWidth>768)return;
  const sidebar=document.getElementById('sidebar');
  const mainArea=document.getElementById('mainArea');
  if(view==='list'){
    sidebar.classList.remove('slide-out');
    mainArea.classList.remove('slide-in');
    document.getElementById('tabList').classList.add('active');
    document.getElementById('tabDetail').classList.remove('active');
  }else if(view==='detail'){
    sidebar.classList.add('slide-out');
    mainArea.classList.add('slide-in');
    document.getElementById('tabList').classList.remove('active');
    document.getElementById('tabDetail').classList.add('active');
  }
}

function mobileBack(){
  mobileView('list');
}

// === Data ===
async function init(){
  if(SESSION_TOKEN){
    try{const res=await api('/api/auth/check');if(res.ok){hideLogin();await refresh();return}}catch(e){}
  }
  showLogin();
}

async function refresh(){
  try{
    // V0.56: Load all vaults first
    const vaultsRes=await api('/api/vaults');
    allVaults=vaultsRes.data||[];
    
    // Auto-select first vault if none selected
    if(!currentVault&&allVaults.length>0){
      // Find current vault (matching vault root) or pick first unlocked
      currentVault=allVaults.find(v=>!v.locked)||allVaults[0];
    }
    
    // Load current vault data
    if(currentVault){
      await loadVaultData(currentVault.id);
    }
    
    // Update top stats
    const totalEntries=allVaults.reduce((s,v)=>s+v.entry_count,0);
    document.getElementById('ctxCount').textContent=allVaults.length;
    document.getElementById('entryCount').textContent=totalEntries;
    renderSidebar();
  }catch(e){console.error(e)}
}

async function loadVaultData(vaultId){
  try{
    const ctxRes=await api(`/api/vaults/${vaultId}/contexts`);
    contexts=ctxRes.data||[];
    currentCtx=contexts.find(c=>c.id===currentCtx?.id)||contexts[0]||null;
    if(currentCtx){
      const logRes=await api(`/api/vaults/${vaultId}/log`);
      currentEntries=logRes.data||[];
    }else{
      currentEntries=[];
    }
  }catch(e){console.error(e);contexts=[];currentEntries=[]}
}

function renderSidebar(){
  const list=document.getElementById('ctxList');
  if(!allVaults.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No vaults found.<br>Run <code>besure init</code></div>';
    return;
  }
  list.innerHTML=allVaults.map((v,i)=>{
    let icon=AGENT_ICONS[v.agent_type]||'\u26AA';
    let locked=v.locked?'\uD83D\uDD12 ':'';
    let active=currentVault&&currentVault.id===v.id?'active':'';
    return `
    <div class="ctx-item stagger ${active}" onclick="selectVault('${v.id}')" style="animation-delay:${i*0.05}s">
      <div class="title">${icon} ${locked}${esc(v.agent_name)}</div>
      <div class="meta">
        <span class="status-badge ${v.locked?'expired':'active'}">${esc(v.agent_type)}</span>
        <span style="font-size:11px;color:var(--text3)">${v.entry_count} entries</span>
      </div>
    </div>`;
  }).join('');
}

async function selectVault(id){
  const vault=allVaults.find(v=>v.id===id);
  if(!vault)return;
  if(vault.locked){
    const pw=prompt('Unlock '+vault.agent_name+':');
    if(!pw)return;
    try{
      const res=await api('/api/vaults/'+id+'/unlock',{method:'POST',body:JSON.stringify({password:pw})});
      if(!res.ok){alert(res.error||'Wrong password');return}
      vault.locked=false;
    }catch(e){alert('Unlock failed');return}
  }
  currentVault=vault;
  await loadVaultData(id);
  renderSidebar();
  renderDetail(currentCtx,currentEntries);
  if(window.innerWidth<=768)mobileView('detail');
}

async function selectCtx(id){
  try{
    const res=await api(`/api/contexts/${id}/log`);
    const entries=res.data||[];
    currentEntries=entries;
    const ctx=contexts.find(c=>c.id===id);
    currentCtx=ctx;
    activeTab='timeline';
    renderSidebar();
    renderDetail(ctx,entries);
    // Mobile: slide to detail view (full screen)
    if(window.innerWidth<=768)mobileView('detail');
  }catch(e){console.error(e)}
}

function switchTab(tab){
  activeTab=tab;
  renderDetail(currentCtx,currentEntries);
  if(tab==='stats'){setTimeout(loadStats,100)}
}

function selectEntryLink(targetId){
  // Find the linked entry and scroll to it or show alert
  if(currentCtx){
    // Switch to timeline tab first
    activeTab='timeline';
    renderDetail(currentCtx,currentEntries);
    // Highlight logic could be added here
  }
}

function renderDetail(ctx,entries){
  const main=document.getElementById('mainContent');
  if(!ctx){main.innerHTML='<div class="empty"><div class="logo">🐉</div><p>Select a context</p></div>';return}

  // Build entries HTML
  // Apply filters
  let filteredEntries=entries;
  if(window._filterType){
    filteredEntries=filteredEntries.filter(e=>window._filterType.includes(e.entry_type));
  }
  if(window._filterFrom){filteredEntries=filteredEntries.filter(e=>e.date.slice(0,10)>=window._filterFrom)}
  if(window._filterTo){filteredEntries=filteredEntries.filter(e=>e.date.slice(0,10)<=window._filterTo)}

  let entriesHtml=filteredEntries.length?filteredEntries.map((e,i)=>{
    let isActive=(e.status||'active')==='active';
    let inactiveClass=isActive?'':' inactive';
    let statusBadgeHtml=e.status&&e.status!=='active'
      ?`<span class="entry-status-badge ${e.status}">${e.status}</span>`:'';
    let resolvedBadge=e.resolved?'<span class="entry-status-badge active" style="background:rgba(52,211,153,0.12);color:var(--green)">✅ resolved</span>':'';
    let resolveBtn=!e.resolved?`<button class="btn btn-sm" style="padding:2px 8px;font-size:11px" onclick="doResolve('${e.id}')">✓ Resolve</button>`:`<button class="btn btn-sm" style="padding:2px 8px;font-size:11px;opacity:0.5" onclick="doUnresolve('${e.id}')">Undo</button>`;
    let linksHtml='';
    if(e.links&&e.links.length>0){
      linksHtml='<div class="entry-links">🔗 ';
      linksHtml+=e.links.map(l=>`<span class="entry-link" onclick="selectEntryLink('${esc(l.target_id)}')">${esc(l.relation)}: ${esc(l.target_id)}</span>`).join(' ');
      linksHtml+='</div>';
    }
    let expiryHtml='';
    if(e.valid_until){
      expiryHtml=`<div class="entry-expiry">⏰ expires: ${esc(e.valid_until)}</div>`;
    }
    return `
    <div class="entry stagger${inactiveClass}" style="animation-delay:${i*0.04}s">
      <div class="entry-bar ${e.entry_type}"></div>
      <div class="entry-body">
        <div class="entry-top">
          <span class="entry-type ${e.entry_type}">${TYPE_ICONS[e.entry_type]||'📝'} ${e.entry_type}${statusBadgeHtml}${resolvedBadge}</span>
          <span class="entry-date">${esc(e.date)} ${resolveBtn}</span>
        </div>
        <div class="entry-content">${esc(e.content)}</div>
        <div style="margin-top:4px"><button class="btn btn-sm" style="padding:2px 8px;font-size:11px;color:var(--text3)" onclick="toggleAppend('${e.id}')">+ Append</button>
          <div id="append-${e.id}" style="display:none;margin-top:6px">
            <textarea id="appendText-${e.id}" rows="2" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px" placeholder="Add to this entry..."></textarea>
            <button class="btn btn-primary btn-sm" style="margin-top:4px" onclick="doAppend('${e.id}')">Append</button>
          </div>
        </div>
        ${linksHtml}
        ${expiryHtml}
      </div>
    </div>`;
  }).join(''):'<div style="padding:24px;text-align:center;color:var(--text3)">No entries match filters</div>';

  // Build config entries HTML
  let configEntries=entries.filter(e=>e.entry_type==='config');
  let configHtml=configEntries.length?configEntries.map(e=>{
    let parts=e.content.split(/:(.*)/s);
    let key=parts[0]?parts[0].trim():'?';
    let val=parts[1]?parts[1].trim():'';
    return `<div class="config-card"><div class="config-key">${esc(key)}</div><div class="config-value">${esc(val)}</div></div>`;
  }).join(''):'<div style="padding:24px;text-align:center;color:var(--text3)">No config entries</div>';

  // Filter bar
  let filterHtml=activeTab==='timeline'?`
    <div style="display:flex;gap:8px;align-items:center;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0">
      <input type="date" id="filterFrom" value="${window._filterFrom||''}" oninput="window._filterFrom=this.value;renderDetail(currentCtx,currentEntries)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px">
      <span style="color:var(--text3);font-size:12px">→</span>
      <input type="date" id="filterTo" value="${window._filterTo||''}" oninput="window._filterTo=this.value;renderDetail(currentCtx,currentEntries)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px">
      <select id="filterType" onchange="window._filterType=this.value?[this.value]:null;renderDetail(currentCtx,currentEntries)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px">
        <option value="">All Types</option>
        <option value="progress">Progress</option>
        <option value="milestone">Milestone</option>
        <option value="decision">Decision</option>
        <option value="blocker">Blocker</option>
        <option value="note">Note</option>
        <option value="lesson">Lesson</option>
        <option value="question">Question</option>
        <option value="config">Config</option>
      </select>
      <button class="btn btn-sm" onclick="window._filterFrom=null;window._filterTo=null;window._filterType=null;document.getElementById('filterFrom').value='';document.getElementById('filterTo').value='';document.getElementById('filterType').value='';renderDetail(currentCtx,currentEntries)">Clear</button>
    </div>
  `:'';

  // Tabs
  let tabsHtml=`
    <div class="detail-tabs">
      <div class="detail-tab ${activeTab==='timeline'?'active':''}" onclick="switchTab('timeline')">📍 Timeline</div>
      <div class="detail-tab ${activeTab==='config'?'active':''}" onclick="switchTab('config')">⚙️ Config (${configEntries.length})</div>
      <div class="detail-tab ${activeTab==='stats'?'active':''}" onclick="switchTab('stats')">📊 Stats</div>
    </div>
  `;

  let statsHtml='<div style="padding:24px;color:var(--text3)">Loading stats...</div>';
  let contentHtml;
  if(activeTab==='config'){
    contentHtml=`<div class="config-section">${configHtml}</div>`;
  } else if(activeTab==='stats'){
    contentHtml=`<div id="statsContent" style="padding:24px;color:var(--text3)">Loading stats...</div>`;
  } else {
    contentHtml=`${filterHtml}<div class="timeline" style="flex:1;overflow-y:auto">${entriesHtml}</div>`;
  }

  main.innerHTML=`
    <div class="detail-header">
      <div>
        <h2>${esc(ctx.title)}</h2>
        <div class="subtitle">
          <span class="id-badge">${esc(ctx.id)}</span>
          <span class="status-badge ${ctx.status}">${ctx.status}</span>
          ${(ctx.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
          ${ctx.summary?' · '+esc(ctx.summary):''}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn btn-primary btn-sm" onclick="showEntryModal()">+ Add Entry</button>
        <button class="btn btn-sm" onclick="exportCtx('${ctx.id}')">Export</button>
      </div>
    </div>
    ${tabsHtml}
    ${contentHtml}
  `;
}

// === Search ===
let searchTimer=null;
function handleSearch(){
  clearTimeout(searchTimer);
  const q=document.getElementById('searchInput').value.trim();
  if(!q){renderSidebar();if(currentCtx)selectCtx(currentCtx.id);return}
  searchTimer=setTimeout(()=>doSearch(q),250);
}

async function doSearch(q){
  try{
    const res=await api(`/api/search?q=${encodeURIComponent(q)}`);
    const results=res.data||[];
    const list=document.getElementById('ctxList');
    if(!results.length){list.innerHTML=`<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No results for "${esc(q)}"</div>`;return}
    list.innerHTML=results.map(r=>`
      <div class="ctx-item" onclick="selectCtx('${r.context.id}')">
        <div class="title">${esc(r.context.title)}</div>
        <div class="meta">
          <span class="status-badge ${r.context.status}">${r.context.status}</span>
          <span style="font-size:11px;color:var(--text3)">${esc(r.entry.entry_type)} · ${esc(r.entry.content.slice(0,50))}...</span>
        </div>
      </div>
    `).join('');
  }catch(e){console.error(e)}
}

// === Modals ===
function showCreateModal(){showModal('createModal')}
function showEntryModal(){if(!currentCtx){alert('Select a context first');return}showModal('entryModal')}
function showModal(id){document.getElementById(id).classList.add('show')}
function hideModal(id){document.getElementById(id).classList.remove('show')}

async function doCreate(){
  const title=document.getElementById('createTitle').value.trim();
  if(!title){alert('Please enter a title');return}
  const tags=document.getElementById('createTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const summary=document.getElementById('createSummary').value.trim();
  try{
    await api('/api/contexts',{method:'POST',body:JSON.stringify({title,tags,summary})});
    hideModal('createModal');
    document.getElementById('createTitle').value='';document.getElementById('createTags').value='';document.getElementById('createSummary').value='';
    await refresh();
  }catch(e){alert('Create failed: '+e.message)}
}

async function doAddEntry(){
  const content=document.getElementById('entryContent').value.trim();
  if(!content){alert('Please enter content');return}
  const entry_type=document.getElementById('entryType').value;
  try{
    await api(`/api/contexts/${currentCtx.id}/entries`,{method:'POST',body:JSON.stringify({content,entry_type})});
    hideModal('entryModal');
    document.getElementById('entryContent').value='';
    await selectCtx(currentCtx.id);refresh();
  }catch(e){alert('Add failed: '+e.message)}
}

function exportCtx(id){window.open(`/api/contexts/${id}/export`,'_blank')}

// === V0.4: Resolve / Append / Stats ===
async function doResolve(entryId){
  try{await api(`/api/entries/${entryId}/resolve`,{method:'POST'});await selectCtx(currentCtx.id)}catch(e){alert('Resolve failed: '+e.message)}
}
async function doUnresolve(entryId){
  // No unresolve endpoint; re-fetch and update locally
  // Actually we can POST to same endpoint but server only does true. Let's use the query API.
  // For simplicity, reload entries
  try{
    // Use direct fetch since there's no unresolve endpoint - use the resolve but we need toggle
    // We'll just reload for now - the resolve button is the main flow
    await selectCtx(currentCtx.id);
  }catch(e){}
}
function toggleAppend(entryId){
  const el=document.getElementById('append-'+entryId);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
async function doAppend(entryId){
  const text=document.getElementById('appendText-'+entryId).value.trim();
  if(!text){alert('Please enter content to append');return}
  try{
    await api(`/api/entries/${entryId}/append`,{method:'POST',body:JSON.stringify({content:text})});
    await selectCtx(currentCtx.id);
  }catch(e){alert('Append failed: '+e.message)}
}

async function loadStats(){
  try{
    const res=await api('/api/stats');
    const s=res.data;
    if(!s){document.getElementById('statsContent').innerHTML='<p>No data</p>';return}
    let html='<div style="max-width:600px">';
    html+=`<div style="margin-bottom:16px"><h3 style="color:var(--text);margin-bottom:4px">Total: ${s.total_contexts} contexts, ${s.total_entries} entries</h3></div>`;
    // By Context
    html+='<h4 style="color:var(--accent);margin:16px 0 8px">By Context</h4>';
    const maxCtx=Math.max(...s.by_context.map(x=>x[1]),1);
    s.by_context.forEach(([title,count])=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><span style="width:160px;font-size:12px;color:var(--text2)">${esc(title)}</span><div style="height:20px;background:var(--accent);border-radius:4px;width:${count/maxCtx*200}px;min-width:30px"></div><span style="font-size:12px;color:var(--text2)">${count}</span></div>`;
    });
    // By Type
    html+='<h4 style="color:var(--accent);margin:16px 0 8px">By Type</h4>';
    const maxType=Math.max(...s.by_type.map(x=>x[1]),1);
    s.by_type.forEach(([type,count])=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><span style="width:100px;font-size:12px;color:var(--text2)">${type}</span><div style="height:20px;background:var(--green);border-radius:4px;width:${count/maxType*200}px;min-width:30px"></div><span style="font-size:12px;color:var(--text2)">${count}</span></div>`;
    });
    // By Status
    html+='<h4 style="color:var(--accent);margin:16px 0 8px">By Status</h4>';
    const maxStatus=Math.max(...s.by_status.map(x=>x[1]),1);
    s.by_status.forEach(([status,count])=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><span style="width:100px;font-size:12px;color:var(--text2)">${status}</span><div style="height:20px;background:var(--grey);border-radius:4px;width:${count/maxStatus*200}px;min-width:30px"></div><span style="font-size:12px;color:var(--text2)">${count}</span></div>`;
    });
    // Resolved
    const pct=s.total_entries>0?Math.round(s.resolved_count/s.total_entries*100):0;
    html+=`<div style="margin-top:16px;padding:12px;background:var(--surface2);border-radius:8px"><b>Resolved:</b> ${s.resolved_count} / ${s.total_entries} (${pct}%)</div>`;
    // Recent
    if(s.recent_activity&&s.recent_activity.length){
      html+='<h4 style="color:var(--accent);margin:16px 0 8px">Recent Activity (7 days)</h4>';
      s.recent_activity.forEach(([date,count])=>{
        html+=`<div style="font-size:12px;color:var(--text2);margin:2px 0">${date}: ${count} entries</div>`;
      });
    }
    html+='</div>';
    document.getElementById('statsContent').innerHTML=html;
  }catch(e){document.getElementById('statsContent').innerHTML='<p>Error: '+e.message+'</p>'}
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

// Init
init();
setInterval(()=>{if(SESSION_TOKEN)refresh()},30000);
</script>
